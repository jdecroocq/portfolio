<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details</title>
  <link rel="icon" type="image/png" href="icons/ico.png"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="header.js" defer></script>
  <script src="footer.js" defer></script>
  <script type="module" src="project_details.js"></script>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="page">
    <div id="loading">Loading...</div>
    <div id="mainContent" style="display: none;">
      <section class="text-panel" id="projectContent"></section>
      <section id="videoSection"></section>
      <section id="imagesSection"></section>
    </div>
  </main>
  <div class="floating-dock">
    <a id="dockPrevProject" class="dock-btn" href="#">
      <svg width="24" height="24" viewBox="0 0 24 24" aria-label="Previous project" role="img" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
        <path d="M14 6 L8 12 L14 18"/>
      </svg>
    </a>
    <a id="dockGallery" class="dock-btn" href="/portfolio/">
      <svg width="24" height="24" viewBox="0 0 24 24" aria-label="Back to the gallery" role="img" fill="currentColor">
        <rect x="0"  y="0"  width="6" height="6"/>
        <rect x="9"  y="0"  width="6" height="6"/>
        <rect x="18" y="0"  width="6" height="6"/>
        <rect x="0"  y="9"  width="6" height="6"/>
        <rect x="9"  y="9"  width="6" height="6"/>
        <rect x="18" y="9"  width="6" height="6"/>
        <rect x="0"  y="18" width="6" height="6"/>
        <rect x="9"  y="18" width="6" height="6"/>
        <rect x="18" y="18" width="6" height="6"/>
      </svg>
    </a>
    <a id="dockNextProject" class="dock-btn" href="#">
      <svg width="24" height="24" viewBox="0 0 24 24" aria-label="Next project" role="img" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
        <path d="M10 6 L16 12 L10 18" />
      </svg>
    </a>
  </div>
   <div id="footer-placeholder"></div>
</body>
</html>
