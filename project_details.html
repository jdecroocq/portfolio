<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details</title>
  <link rel="icon" type="image/png" href="icons/ico.png"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="header.js" defer></script>
  <script src="footer.js" defer></script>
  <script type="module" src="project_details.js"></script>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="page">
    <div id="loading">Loading...</div>
    <div id="mainContent" style="display: none;">
      <section class="text-panel" id="projectContent"></section>
      <section id="videoSection"></section>
      <section id="imagesSection"></section>
    </div>
  </main>
  <div class="floating-dock">
    <a id="dockPrevProject" class="dock-btn" href="#">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
        <title>Previous project</title>
        <path d="M17 3 L7 12 L17 21"/>
      </svg>
    </a>
    <a id="dockGallery" class="dock-btn" href="/portfolio/">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
        <title>Back to gallery</title>
        <path d="M6 18 L6 11 L12 6 L18 11 L18 18 Z"/>
      </svg>
    </a>
    <a id="dockNextProject" class="dock-btn" href="#">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
        <title>Next project</title>
        <path d="M7 3 L17 12 L7 21"/>
      </svg>
    </a>
  </div>
  <div id="footer-placeholder"></div>
</body>
</html>
