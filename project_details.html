<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details</title>
  <link rel="icon" type="image/png" href="icons/ico.png"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="header.js" defer></script>
  <script src="footer.js" defer></script>
  <script type="module" src="project_details.js"></script>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="page">
    <div id="loading">Loading...</div>
    <div id="mainContent" style="display: none;">
      <section class="text-panel" id="projectContent"></section>
      <section id="videoSection"></section>
      <section id="imagesSection"></section>
    </div>
  </main>
  <div class="floating-dock">
    <a id="dockPrevProject" class="dock-btn" href="#" title="Previous project">
      <svg width="32" height="32" viewBox="0 0 32 32">
        <polyline points="20,8 12,16 20,24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
      </svg>
    </a>
    <a id="dockGallery" class="dock-btn" href="/portfolio/" title="Back to the gallery">
    <svg width="32" height="32" viewBox="0 0 32 32">
      <g fill="currentColor">
        <rect x="0"  y="0"  width="8" height="8"/>
        <rect x="12" y="0"  width="8" height="8"/>
        <rect x="24" y="0"  width="8" height="8"/>
        <rect x="0"  y="12" width="8" height="8"/>
        <rect x="12" y="12" width="8" height="8"/>
        <rect x="24" y="12" width="8" height="8"/>
        <rect x="0"  y="24" width="8" height="8"/>
        <rect x="12" y="24" width="8" height="8"/>
        <rect x="24" y="24" width="8" height="8"/>
      </g>
    </svg>
    </a>
    <a id="dockNextProject" class="dock-btn" href="#" title="Next project">
      <svg width="32" height="32" viewBox="0 0 32 32">
        <polyline points="12,8 20,16 12,24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
      </svg>
    </a>
  </div>
   <div id="footer-placeholder"></div>
</body>
</html>
