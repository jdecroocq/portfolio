<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details</title>
  <link rel="icon" type="image/png" href="icons/ico.png"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="header.js" defer></script>
  <script src="footer.js" defer></script>
  <script src="project_details.js"></script>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="page">
    <div id="loading">Loading...</div>
    <div id="mainContent" style="display: none;">
      <section class="project-section text-panel" id="projectContent"></section>
      <section id="videoSection"></section>
      <section id="imagesSection"></section>
    </div>
  </main>
  <div class="floating-dock">
  <a id="dockPrevProject" class="dock-btn dock-btn-left" href="#" title="Previous project">
    <svg width="30" height="30" viewBox="0 0 30 30">
      <polyline points="19,7 11,15 19,23" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
    </svg>
  </a>
  <a id="dockGallery" class="dock-btn dock-btn-center" href="/portfolio/" title="Back to the gallery">
    <svg width="30" height="30" viewBox="0 0 30 30">
  <g fill="currentColor">
    <rect x="4.5"  y="4.5"  width="5" height="5"/>
    <rect x="12.5" y="4.5"  width="5" height="5"/>
    <rect x="20.5" y="4.5"  width="5" height="5"/>
    <rect x="4.5"  y="12.5" width="5" height="5"/>
    <rect x="12.5" y="12.5" width="5" height="5"/>
    <rect x="20.5" y="12.5" width="5" height="5"/>
    <rect x="4.5"  y="20.5" width="5" height="5"/>
    <rect x="12.5" y="20.5" width="5" height="5"/>
    <rect x="20.5" y="20.5" width="5" height="5"/>
  </g>
    </svg>
  </a>
  <a id="dockNextProject" class="dock-btn dock-btn-right" href="#" title="Next project">
    <svg width="30" height="30" viewBox="0 0 30 30">
      <polyline points="11,7 19,15 11,23" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
    </svg>
  </a>
  </div>
   <div id="footer-placeholder"></div>
</body>
</html>
