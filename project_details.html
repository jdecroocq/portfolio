<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details</title>
  <link rel="icon" type="image/png" href="icons/ico.png"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="header.js" defer></script>
  <script src="footer.js" defer></script>
  <script type="module" src="project_details.js"></script>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="page">
    <div id="loading">Loading...</div>
    <div id="mainContent" style="display: none;">
      <section class="text-panel" id="projectContent"></section>
      <section id="videoSection"></section>
      <section id="imagesSection"></section>
    </div>
  </main>
  <div class="floating-dock">
    <a id="dockPrevProject" class="dock-btn" href="#" aria-label="Previous project">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" role="img">
        <path d="M14 2 L4 12 L14 22"/>
      </svg>
    </a>
    <a id="dockGallery" class="dock-btn" href="/portfolio/" aria-label="Return to gallery">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" role="img">
        <path d="
          M2 2 H8 V8 H2 Z
          M10 2 H16 V8 H10 Z
          M18 2 H24 V8 H18 Z
      
          M2 10 H8 V16 H2 Z
          M10 10 H16 V16 H10 Z
          M18 10 H24 V16 H18 Z
      
          M2 18 H8 V24 H2 Z
          M10 18 H16 V24 H10 Z
          M18 18 H24 V24 H18 Z
        " />
      </svg>
    </a>
    <a id="dockNextProject" class="dock-btn" href="#" aria-label="Next project">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" role="img">
        <path d="M10 2 L20 12 L10 22"/>
      </svg>
    </a>
  </div>
  <div id="footer-placeholder"></div>
</body>
</html>
