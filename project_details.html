<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="icons/ico.png" type="image/png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Details</title>
  <link rel="stylesheet" href="style.css" />
</head>

  <link rel="preload" href="icons/jean-decroocq-logo_3.7_v_w-a_00_0256.svg" as="image">

  <script src="burger.js" defer></script>
  <script src="project_details.js"></script>
  <script src="footer.js" defer></script>
  
<body class="project-details-page">
  <header>
    <div class="top-bar">
      <div class="logo">
        <a href="index">
          <img src="icons/jean-decroocq-logo_3.7_v_w-a_00_0256.svg" alt="Logo" />
        </a>
      </div>
      <!-- Bouton burger avec structure pour les barres -->
      <button class="burger" aria-label="Toggle menu">
        <span class="bar bar1"></span>
        <span class="bar bar2"></span>
        <span class="bar bar3"></span>
      </button>
    </div>
    <nav>
  <ul class="nav-links">
    <li><a href="/portfolio/">PROJECTS</a></li>
    <li><a href="/portfolio/about_me">ABOUT ME</a></li>
  </ul>
    </nav>
  </header>


  <main class="content">
    <!-- Écran de chargement -->
    <div id="loadingMessage">Loading...</div>

    <!-- Contenu principal (masqué au départ) -->
    <div id="mainContent" style="display: none;">
      <!-- Section contenant les détails du projet -->
      <section class="project-section">
        <div id="projectContent"></div>
      </section>

      <!-- Section pour la vidéo du projet -->
      <section id="videoSection"></section>

      <!-- Section pour afficher les images principales -->
      <section class="images-main-section">
        <div id="imagesSection" class="images-gallery"></div>
      </section>
    </div>
  </main>


  <div class="floating-dock">
  <a id="dockPrevProject" class="dock-btn dock-btn-left" href="#" title="Previous project">
    <svg width="30" height="30" viewBox="0 0 30 30">
      <polyline points="19,7 11,15 19,23" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
    </svg>
  </a>
  <a id="dockGallery" class="dock-btn dock-btn-center" href="index" title="Back to the gallery">
    <svg width="30" height="30" viewBox="0 0 30 30">
  <g fill="#fff">
    <rect x="4.5"  y="4.5"  width="5" height="5"/>
    <rect x="12.5" y="4.5"  width="5" height="5"/>
    <rect x="20.5" y="4.5"  width="5" height="5"/>

    <rect x="4.5"  y="12.5" width="5" height="5"/>
    <rect x="12.5" y="12.5" width="5" height="5"/>
    <rect x="20.5" y="12.5" width="5" height="5"/>

    <rect x="4.5"  y="20.5" width="5" height="5"/>
    <rect x="12.5" y="20.5" width="5" height="5"/>
    <rect x="20.5" y="20.5" width="5" height="5"/>
  </g>
    </svg>
  </a>
  <a id="dockNextProject" class="dock-btn dock-btn-right" href="#" title="Next project">
    <svg width="30" height="30" viewBox="0 0 30 30">
      <polyline points="11,7 19,15 11,23" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
    </svg>
  </a>
</div>
 
  
</body>
</html>
