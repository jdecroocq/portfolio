<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page not found</title>

  <link rel="stylesheet" href="/portfolio/style.css" />
  <link rel="icon" type="image/png" href="/portfolio/icons/ico.png" />
  <link rel="preload" as="image" href="/portfolio/icons/jean-decroocq-logo_3.7_v_w-a_00_0256.svg" />

  <script src="/portfolio/header.js" defer></script>
  <script src="/portfolio/burger.js" defer></script>
  <script src="/portfolio/footer.js" defer></script>

  <style>
    body {
      margin: 0;
    }
  </style>
</head>

<body>

  <div id="header-placeholder"></div>
  
  <main class="notfound-row" id="notfound-row">
    <div class="notfound-textblock">
      <h1 class="notfound-title">PAGE NOT FOUND</h1>
      <h2 class="notfound-subtitle">No worries, it happens even to the best of us.</h2>
      <div class="notfound-details">
        <p>The page you're looking for doesn’t exist (error 404), or it may have been moved.</p>
        <p>Double-check the URL, head back to the homepage, or hang around here a moment and gather your thoughts.</p>
      </div>
      <div class="notfound-link-container">
        <a class="notfound-link" href="https://jdecroocq.github.io/portfolio/">Back to the homepage</a>
      </div>
    </div>

    <div class="notfound-image-placeholder">
      <a href="https://en.wikipedia.org/wiki/Utah_teapot" target="_blank" rel="noopener noreferrer">
        <img class="notfound-floating-image" src="/portfolio/icons/teapot.svg" alt="Teapot icon" />
      </a>
    </div>

  </main>

  <div id="footer-placeholder"></div>

</body>
</html>
