<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page not found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/portfolio/style.css">
</head> 
<body class="notfound-body">
  <div class="notfound-row" id="notfound-row">
    <div class="notfound-textblock">
      <h1 class="notfound-title">Page not found</h1>
      <h2 class="notfound-subtitle">No worries, it happens even to the best of us.</h2>
      <p class="notfound-details">
        The page you're looking for doesn’t exist (error 404), or it may have been moved.<br><br>
        Double-check the URL, head back to the homepage, or hang around here a moment and gather your thoughts.
      </p>
      <div class="notfound-link-container">
        <a href="https://jdecroocq.github.io/portfolio/" class="notfound-link">Back to the homepage</a>
      </div>
    </div>
    <div class="notfound-image-placeholder">
      <img src="/portfolio/icons/teapot.png" alt="Teapot icon" style="width:100%">
    </div>
  </div>

  <script>
    function centerNotFoundContent() {
      const row = document.getElementById('notfound-row');
      if (!row) return;
      row.style.marginTop = '0px';
      row.style.marginBottom = '0px';
      const windowHeight = window.innerHeight;
      const windowWidth = window.innerWidth;
      const rowHeight = row.offsetHeight;
      const minTop = windowWidth * 0.03; // 3vw
      const minBottom = 60; // 60px
      const availableSpace = windowHeight - rowHeight;
      let marginTop, marginBottom;
      if (availableSpace >= minTop + minBottom) {
        const remaining = availableSpace - minTop - minBottom;
        marginTop = minTop + remaining / 2;
        marginBottom = minBottom;
      } else {
        marginTop = minTop;
        marginBottom = minBottom;
      }
      row.style.marginTop = `${marginTop}px`;
      row.style.marginBottom = `${marginBottom}px`;
    }
    window.addEventListener('load', centerNotFoundContent);
    window.addEventListener('resize', centerNotFoundContent);
  </script>
</body>
</html>
