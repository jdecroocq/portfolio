<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page not found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body class="notfound-body">
  <div class="notfound-row">
    <div class="notfound-textblock">
      <h1 class="notfound-title">Page not found</h1>
      <h2 class="notfound-subtitle">No worries, it happens even to the best of us.</h2>
      <div class="notfound-details">
        <p>The page you're looking for doesn’t exist (error 404), or it may have been moved.</p>
        <p>Double-check the URL, head back to the homepage, or hang around here a moment and gather your thoughts.</p>
        <a class="notfound-link" href="https://jdecroocq.github.io/portfolio/">Back to the homepage</a>
      </div>
    </div>
    <!-- <div class="notfound-image-placeholder"></div> -->
  </div>
  <div class="notfound-numbers-bg">
    <div class="numbers-grid"></div>
  </div>
  <script>
  (function() {
    var cols = Math.floor(window.innerWidth * 0.52 / (window.innerWidth * 0.04));
    var rows = Math.floor(window.innerHeight / (window.innerWidth * 0.045));
    var grid = '';
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        if (r === Math.floor(rows / 2) && c === Math.floor(cols * 0.6)) {
          grid += '<span class="numbers-404">404</span>';
        } else {
          grid += Math.floor(Math.random() * 10);
        }
      }
      grid += '<br>';
    }
    document.querySelector('.numbers-grid').innerHTML = grid;
  })();
  </script>
</body>
</html>
